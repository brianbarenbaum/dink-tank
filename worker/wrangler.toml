name = "dink-tank-chat-worker"
main = "src/runtime/index.ts"
compatibility_date = "2026-02-15"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[dev]
port = 8787

# Production recommendation: configure Hyperdrive for Supabase Postgres and
# set the generated ID below.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "cbf8f04710db4376aa7fb2774371973a"

[[hyperdrive]]
binding = "CHAT_HYPERDRIVE"
id = "c30252101e374b779ca82ce491219a99"

# Optional dedicated chat-only Hyperdrive binding. Point this at the
# least-privilege chat_reader role when you want chat isolated from the
# shared database connection used by auth/lineup-lab.
# [[hyperdrive]]
# binding = "CHAT_HYPERDRIVE"
# id = "<your-chat-hyperdrive-id>"
